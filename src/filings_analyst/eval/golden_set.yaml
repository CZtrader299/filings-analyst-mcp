# XOM — 0000034088-26-000045 (most recent 10-K)
# ====================================================================

- id: xom-001
  ticker: XOM
  accession_no: "0000034088-26-000045"
  question: "What does ExxonMobil describe as its primary business segments?"
  type: easy
  expected_section: "Business"
  reference_answer: "ExxonMobil reports three primary segments: Upstream (exploration and production of crude oil and natural gas), Energy Products (downstream — refining and fuels marketing), Chemical Products, and Specialty Products. Some filings combine downstream into a single segment."
  scope: in-scope
  notes: "Foundational segment disclosure for an oil major."

- id: xom-002
  ticker: XOM
  accession_no: "0000034088-26-000045"
  question: "What does ExxonMobil disclose about climate change and energy transition risks?"
  type: easy
  expected_section: "Risk Factors"
  reference_answer: "ExxonMobil discloses risks from climate-related regulation (carbon pricing, methane rules, fuel-economy standards), shifts in consumer and policymaker preferences toward lower-carbon energy, potential stranded-asset risk for long-dated hydrocarbon projects, and litigation risk from climate-related lawsuits."
  scope: in-scope
  notes: "Central oil-major Risk Factor."

- id: xom-003
  ticker: XOM
  accession_no: "0000034088-26-000045"
  question: "What commodity-price risk does ExxonMobil identify as material to its earnings?"
  type: easy
  expected_section: "Risk Factors"
  reference_answer: "ExxonMobil identifies that crude oil, natural gas, refined product, and petrochemical prices are volatile and outside its control, and that earnings, cash flow, and capital allocation are highly sensitive to those prices. It also notes regional price differentials (e.g., Brent vs WTI, Henry Hub vs international LNG) as material drivers."
  scope: in-scope
  notes: "Commodity-price exposure is the binding constraint on XOM earnings."

- id: xom-004
  ticker: XOM
  accession_no: "0000034088-26-000045"
  question: "How does ExxonMobil's capital-allocation discussion balance investment in traditional oil and gas projects with investment in lower-carbon initiatives like carbon capture and lithium?"
  type: hard
  expected_section: "MD&A"
  reference_answer: "ExxonMobil's MD&A discusses a capital-allocation framework that funds attractive-return oil-and-gas projects (particularly Guyana, Permian, and LNG) while also funding Low Carbon Solutions investments — carbon capture and storage, hydrogen, biofuels, and lithium for batteries — with the latter framed as a smaller share of capex but with longer-dated optionality."
  scope: in-scope
  notes: "Capital-allocation synthesis across traditional and low-carbon."

- id: xom-005
  ticker: XOM
  accession_no: "0000034088-26-000045"
  question: "How does ExxonMobil describe the strategic rationale and financial impact of its acquisition of Pioneer Natural Resources?"
  type: hard
  expected_section: "MD&A"
  reference_answer: "ExxonMobil describes the Pioneer acquisition as combining Pioneer's Permian Basin position with ExxonMobil's technology and development capabilities to lower per-barrel cost and accelerate emissions reductions. It discusses purchase accounting, goodwill, integration progress, and the impact on Upstream segment volumes and reserves."
  scope: in-scope
  notes: "Major recent M&A — should be discussed in MD&A and Business."

